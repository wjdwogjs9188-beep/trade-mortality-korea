 icd10: 'I26-I51'
 label: 기타 심장 질환
 note: "v3.x 발견 -3.8% 보호효과 (라벨 정정)"

 cerebrovascular:
 code: '070'
 icd10: 'I60-I69'
 label: 뇌혈관 질환

 hypertensive:
 code: '067'
 icd10: 'I10-I15'
 label: 고혈압성 질환

 cancer:
