---
# KOSIS 사망원인 104항목 분류 — 완성판 (2026-05-01)
#
# 출처: 0_raw/mortality_kostat/usrcnfrm/파일설계서(공공용)_사망원인통계_사망_연간자료_B형(제공)_1997(코드집포함).xlsx
# 시트 "코드정보" R321-R424
# 검증: 코드 102 = 자살 (KOSTAT 4년치 매칭 100%)
# 사용 컬럼: 사망 microdata `사망원인_104항목분류코드`
#
# ⚠️ 사용자 메모리 정정:
# - 029 ≠ 약물남용. ACTUALLY = 식도의 악성신생물 (oesophagus C15)
# - 069 ≠ 알코올성간질환. ACTUALLY = 기타 심장 질환 (Other heart diseases I26-I51)
# v3.x 논문에서 "기타 심장질환 보호효과 -3.8%" 발견은 ICD 매핑 자체는
# 맞았지만 라벨이 "alcohol"로 잘못 표기되어 있었음.
#
# Deaths of despair 후보 코드 (Case-Deaton 2015 정의):
# - Suicide: 102 (X60-X84)
# - Drug poisoning: 101 (유독성 물질 불의 중독 X40-X49) + 057 (정신활성물질 F10-F19)
# - Alcoholic liver disease: 081 (간 질환 K70-K77, 알코올성 포함)
#
# Pierce-Schott 2020 비교 outcome:
# - AMI/허혈성 심장: 068 (Ischaemic heart I20-I25)
# - Other heart: 069 (Other heart diseases I26-I51) ← v3.x 보호효과 발견
# - Cerebrovascular: 070 (I60-I69)
# - Lung cancer: 035 (C33-C34)
# - Liver cancer: 032 (C22)
# - Stomach cancer: 030 (C16)

verified_codes:
 '102':
 label_kr: 고의적 자해(자살)
 label_en: Intentional self-harm (Suicide)
 icd10_likely: ['X60-X84', 'Y87.0']
 verification:
 method: KOSTAT 공식 자살 통계 vs raw 코드별 카운트 매칭
 year_2010: {raw_count: 15566, kostat_official: 15566, match: 100%}
 year_2011: {raw_count: 15906, kostat_official: 15906, match: 100%}
 year_2015: {raw_count: 13513, kostat_official: 13513, match: 100%}
 year_2019: {raw_count: 13799, kostat_official: 13799, match: 100%}
 confidence: HIGH

# ===========================================================================
# 본 연구 핵심 사인 (deaths of despair + cardiovascular + cancer + respiratory)
# ===========================================================================
research_outcomes:

 deaths_of_despair:
 suicide:
 code: '102'
 icd10: 'X60-X84, Y87.0'
 label: 고의적 자해(자살)

 drug_poisoning_accidental:
 code: '101'
 icd10: 'X40-X49'
 label: 유독성 물질에 의한 불의의 중독 및 노출
 note: "Case-Deaton drug poisoning과 가장 가까움 (의도되지 않은 약물 중독)"

 drug_behavior:
 code: '057'
 icd10: 'F10-F19'
 label: 정신활성물질 사용에 의한 정신 및 행동장애
